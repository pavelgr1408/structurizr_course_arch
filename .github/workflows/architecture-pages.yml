name: Publish Architecture Site


on:
  push:
    branches:
      - master
    paths:
      - "architecture/**"
      - ".github/workflows/architecture-pages.yml"
  pull_request:
    branches:
      - master
    paths:
      - "architecture/**"
      - ".github/workflows/architecture-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Structurizr workspace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate workspace.dsl
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/usr/local/structurizr" \
            structurizr/cli:latest \
            validate \
            -workspace /usr/local/structurizr/architecture/workspace.dsl

  build:
    name: Build static architecture site
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Export Structurizr static site
        run: |
          rm -rf site
          mkdir -p site

          docker run --rm \
            -v "${{ github.workspace }}:/usr/local/structurizr" \
            structurizr/cli:latest \
            export \
            -workspace /usr/local/structurizr/architecture/workspace.dsl \
            -format static \
            -output /usr/local/structurizr/site

      - name: Show generated files
        run: |
          echo "Generated files:"
          find site -maxdepth 4 -type f -print
          echo "Site directory:"
          ls -la site

      - name: Verify index.html exists
        run: |
          test -f site/index.html

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy static site
        id: deployment
        uses: actions/deploy-pages@v5
